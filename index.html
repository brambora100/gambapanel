<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonutGamba | Admin Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --accent: #2ecc71;
            --bg: #03060a;
            --panel: #0d131c;
            --input-bg: #141b26;
            --border: #1e2632;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --red: #e74c3c;
            --blue: #3498db;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            padding: 40px;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; }
        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--accent); }

        /* STATS CARDS */
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); 
            gap: 20px; 
            margin-bottom: 40px; 
        }
        .stat-card { 
            background: var(--panel); 
            padding: 25px; 
            border-radius: 18px; 
            border: 1px solid var(--border); 
        }
        .stat-card h3 { color: var(--text-dim); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; }
        .stat-card p { font-size: 32px; font-weight: 800; color: var(--accent); }

        /* TABLES */
        .section { background: var(--panel); border-radius: 20px; border: 1px solid var(--border); padding: 25px; margin-bottom: 30px; }
        .section-title { font-size: 18px; font-weight: 800; margin-bottom: 20px; display: flex; justify-content: space-between; }
        
        table { width: 100%; border-collapse: collapse; text-align: left; }
        th { padding: 15px; color: var(--text-dim); font-size: 12px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 15px; border-bottom: 1px solid var(--border); font-size: 14px; }
        tr:last-child td { border-bottom: none; }

        .player-info { display: flex; align-items: center; gap: 12px; }
        .player-info img { width: 32px; height: 32px; border-radius: 6px; background: var(--input-bg); }

        /* BUTTONS */
        .btn { 
            padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; 
            font-weight: 700; font-size: 12px; transition: 0.2s; 
        }
        .btn-verify { background: var(--blue); color: white; }
        .btn-money { background: var(--accent); color: white; }
        .btn-delete { background: var(--red); color: white; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }

        .status-badge { padding: 4px 8px; border-radius: 6px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .status-pending { background: var(--gold); color: black; }
        .status-done { background: var(--accent); color: white; }

        input[type="number"] {
            background: var(--input-bg); border: 1px solid var(--border); color: white;
            padding: 5px 10px; border-radius: 6px; width: 80px; margin-right: 5px;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">ADMIN<span>PANEL</span></div>
    <div id="connection-status" style="color: var(--accent); font-size: 12px; font-weight: 800;">● LIVE CONNECTION</div>
</div>

<div class="stats-grid">
    <div class="stat-card">
        <h3>Total Players</h3>
        <p id="stat-players">0</p>
    </div>
    <div class="stat-card">
        <h3>Total Circulating</h3>
        <p id="stat-balance">0 $</p>
    </div>
    <div class="stat-card">
        <h3>Total Wagered</h3>
        <p id="stat-wagered">0 $</p>
    </div>
</div>

<div class="section">
    <div class="section-title">Active Players</div>
    <table>
        <thead>
            <tr>
                <th>Player</th>
                <th>Current Balance</th>
                <th>Wagered</th>
                <th>Status</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="player-table">
            </tbody>
    </table>
</div>

<div class="section">
    <div class="section-title">Wallet Requests (Deposit/Withdraw)</div>
    <table>
        <thead>
            <tr>
                <th>Time</th>
                <th>Player</th>
                <th>Type</th>
                <th>Amount</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="request-table">
            </tbody>
    </table>
</div>

<script>
    // Firebase Config (Must match your index.html)
    const firebaseConfig = { apiKey: "AIzaSyDNrZQJDgTITduIm62uTU1QTaDLBMZ9hws", authDomain: "donutgamba.firebaseapp.com", projectId: "donutgamba", appId: "1:785116130586:web:e7a4c72b9fed8a9efdd0a3" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // --- DATA LOADING ---

    function initDashboard() {
        // Listen for Users
        db.collection('users').onSnapshot(snap => {
            const table = document.getElementById('player-table');
            table.innerHTML = '';
            
            let totalBal = 0;
            let totalWag = 0;
            document.getElementById('stat-players').innerText = snap.size;

            snap.forEach(doc => {
                const u = doc.data();
                const id = doc.id;
                totalBal += (u.balance || 0);
                totalWag += (u.wagered || 0);

                table.innerHTML += `
                    <tr>
                        <td>
                            <div class="player-info">
                                <img src="https://minotar.net/helm/${u.nick}/32">
                                <div>
                                    <div style="font-weight:800">${u.nick}</div>
                                    <div style="font-size:10px; color:var(--text-dim)">ID: ${id.substring(0,6)}...</div>
                                </div>
                            </div>
                        </td>
                        <td style="color:var(--accent); font-weight:800">${(u.balance || 0).toLocaleString()} $</td>
                        <td>${(u.wagered || 0).toLocaleString()} $</td>
                        <td>
                            ${u.verified ? '✅' : '<span style="color:var(--red)">' + u.vCode + '</span>'}
                        </td>
                        <td>
                            <input type="number" id="amt-${id}" placeholder="0">
                            <button class="btn btn-money" onclick="updateBalance('${id}', 'add')">ADD</button>
                            ${!u.verified ? `<button class="btn btn-verify" onclick="verifyUser('${id}')">VERIFY</button>` : ''}
                        </td>
                    </tr>
                `;
            });

            document.getElementById('stat-balance').innerText = totalBal.toLocaleString() + " $";
            document.getElementById('stat-wagered').innerText = totalWag.toLocaleString() + " $";
        });

        // Listen for Requests
        db.collection('requests').orderBy('timestamp', 'desc').limit(10).onSnapshot(snap => {
            const table = document.getElementById('request-table');
            table.innerHTML = '';

            snap.forEach(doc => {
                const r = doc.data();
                const date = r.timestamp ? new Date(r.timestamp.seconds * 1000).toLocaleTimeString() : '...';
                
                table.innerHTML += `
                    <tr>
                        <td style="color:var(--text-dim)">${date}</td>
                        <td style="font-weight:700">${r.nick}</td>
                        <td style="color:${r.type === 'deposit' ? 'var(--accent)' : 'var(--red)'}">${r.type.toUpperCase()}</td>
                        <td style="font-weight:800">${r.amount.toLocaleString()} $</td>
                        <td><span class="status-badge status-${r.status}">${r.status}</span></td>
                        <td>
                            ${r.status === 'pending' ? `<button class="btn btn-verify" onclick="completeRequest('${doc.id}')">MARK DONE</button>` : '---'}
                        </td>
                    </tr>
                `;
            });
        });
    }

    // --- ACTIONS ---

    async function updateBalance(id, type) {
        const input = document.getElementById(`amt-${id}`);
        const val = parseInt(input.value);
        if(!val) return alert("Enter amount!");

        await db.collection('users').doc(id).update({
            balance: firebase.firestore.FieldValue.increment(val)
        });
        input.value = '';
    }

    async function verifyUser(id) {
        if(confirm("Verify this user manually?")) {
            await db.collection('users').doc(id).update({ verified: true });
        }
    }

    async function completeRequest(requestId) {
        await db.collection('requests').doc(requestId).update({ status: 'done' });
    }

    initDashboard();
</script>
</body>
</html>
