<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DonutGamba | Sovereign Admin</title>
    
    <link rel="icon" type="image/png" href="https://i.imgur.com/PlToMoQ.png">
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #2ecc71;
            --bg: #03060a;
            --sidebar: #090e14;
            --card: #0d131c;
            --input: #141b26;
            --border: #1e2632;
            --text: #ffffff;
            --text-dim: #94a3b8;
            --red: #ff4757;
            --blue: #3498db;
            --gold: #ffa502;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; height: 100vh; overflow: hidden; }

        /* SIDEBAR */
        .sidebar { width: 280px; background: var(--sidebar); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 30px 20px; }
        .side-logo { font-size: 22px; font-weight: 900; margin-bottom: 40px; display: flex; align-items: center; gap: 10px; }
        .side-logo span { color: var(--primary); }
        .side-logo img { width: 30px; }

        .nav-item {
            padding: 14px 18px; border-radius: 12px; color: var(--text-dim); text-decoration: none;
            font-weight: 600; font-size: 13px; margin-bottom: 8px; transition: 0.2s;
            display: flex; align-items: center; gap: 12px; cursor: pointer; border: none; background: transparent; width: 100%;
        }
        .nav-item.active, .nav-item:hover { background: var(--input); color: var(--text); }

        /* CONTENT */
        .main { flex: 1; padding: 40px; overflow-y: auto; display: none; }
        .main.active { display: block; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid var(--border); }
        .stat-card h3 { color: var(--text-dim); font-size: 11px; text-transform: uppercase; margin-bottom: 8px; }
        .stat-card p { font-size: 24px; font-weight: 800; }

        /* PANELS */
        .panel { background: var(--card); border-radius: 24px; border: 1px solid var(--border); padding: 25px; margin-bottom: 25px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; color: var(--text-dim); font-size: 10px; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        td { padding: 14px 12px; border-bottom: 1px solid var(--border); font-size: 13px; }

        /* ACTION CONTROLS */
        .controls { display: flex; gap: 5px; flex-wrap: wrap; }
        .in-sm { background: var(--input); border: 1px solid var(--border); color: white; padding: 6px; border-radius: 6px; width: 80px; font-size: 12px; }
        
        .btn { padding: 6px 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: 700; font-size: 10px; transition: 0.2s; text-transform: uppercase; }
        .btn-green { background: var(--primary); color: white; }
        .btn-blue { background: var(--blue); color: white; }
        .btn-red { background: var(--red); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .btn:hover { opacity: 0.7; transform: translateY(-1px); }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 9px; font-weight: 800; }
        .badge-dep { background: rgba(46, 204, 113, 0.1); color: var(--primary); }
        .badge-wit { background: rgba(255, 71, 87, 0.1); color: var(--red); }
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="side-logo"><img src="https://i.imgur.com/PlToMoQ.png"> DONUT<span>ADMIN</span></div>
    <button class="nav-item active" onclick="showTab('dashboard')">Dashboard</button>
    <button class="nav-item" onclick="showTab('users')">User Management</button>
    <button class="nav-item" onclick="showTab('logs')">Transaction Logs</button>
    <button class="nav-item" onclick="showTab('settings')">Global Settings</button>
</aside>

<main id="tab-dashboard" class="main active">
    <div class="header"><h1>Main Dashboard</h1><div class="badge badge-dep">SYSTEM OPERATIONAL</div></div>
    <div class="stats-grid">
        <div class="stat-card"><h3>Total Users</h3><p id="s-u">0</p></div>
        <div class="stat-card"><h3>Circulating</h3><p id="s-b" style="color:var(--primary)">0 $</p></div>
        <div class="stat-card"><h3>Total Wager</h3><p id="s-w" style="color:var(--blue)">0 $</p></div>
        <div class="stat-card"><h3>Pending Requests</h3><p id="s-p" style="color:var(--gold)">0</p></div>
    </div>
    <div class="panel">
        <div class="header"><h2>Pending Transactions</h2></div>
        <table id="dash-req"></table>
    </div>
</main>

<main id="tab-users" class="main">
    <div class="header"><h1>Database Management</h1></div>
    <div class="panel">
        <input type="text" class="in-sm" style="width: 100%; margin-bottom: 20px; padding: 12px;" placeholder="Search user by nickname..." onkeyup="filterUsers(this.value)">
        <table>
            <thead>
                <tr><th>User</th><th>Balance</th><th>Wagered</th><th>Status</th><th>Advanced Control</th></tr>
            </thead>
            <tbody id="user-list"></tbody>
        </table>
    </div>
</main>

<main id="tab-logs" class="main">
    <div class="header"><h1>Financial Audit</h1></div>
    <div class="panel">
        <table id="full-logs"></table>
    </div>
</main>

<main id="tab-settings" class="main">
    <div class="header"><h1>Global Config</h1></div>
    <div class="panel" style="max-width: 500px;">
        <h3 style="margin-bottom: 15px;">Withdrawal Requirements</h3>
        <label style="font-size: 12px; color: var(--text-dim);">Min. Wager to Withdraw ($)</label>
        <input type="number" class="in-sm" style="width: 100%; margin: 10px 0 20px;" value="1000000">
        <button class="btn btn-green" style="width: 100%;">Save System Settings</button>
        <hr style="margin: 30px 0; border: 0; border-top: 1px solid var(--border);">
        <button class="btn btn-red" style="width: 100%;" onclick="alert('Danger: This will reset all sessions.')">Force Global Logout</button>
    </div>
</main>

<script>
    const firebaseConfig = { 
        apiKey: "AIzaSyDNrZQJDgTITduIm62uTU1QTaDLBMZ9hws", 
        authDomain: "donutgamba.firebaseapp.com", 
        projectId: "donutgamba", 
        appId: "1:785116130586:web:e7a4c72b9fed8a9efdd0a3" 
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    function showTab(t) {
        document.querySelectorAll('.main').forEach(m => m.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        document.getElementById('tab-' + t).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function init() {
        // REAL-TIME USERS
        db.collection('users').onSnapshot(snap => {
            const list = document.getElementById('user-list');
            let tb = 0, tw = 0;
            list.innerHTML = '';
            
            snap.forEach(doc => {
                const u = doc.data(); const id = doc.id;
                tb += (u.balance || 0); tw += (u.wagered || 0);
                list.innerHTML += `
                    <tr data-n="${u.nick.toLowerCase()}">
                        <td><b>${u.nick}</b><br><small style="color:var(--text-dim)">${id.slice(0,8)}</small></td>
                        <td style="color:var(--primary)">${(u.balance || 0).toLocaleString()} $</td>
                        <td>${(u.wagered || 0).toLocaleString()} $</td>
                        <td>${u.verified ? '✅' : `<button class="btn btn-blue" onclick="vUser('${id}')">Verify</button>`}</td>
                        <td>
                            <div class="controls">
                                <input type="number" class="in-sm" id="v-${id}" placeholder="Amount">
                                <button class="btn btn-green" onclick="modBal('${id}', 'add')">Add</button>
                                <button class="btn btn-outline" onclick="modBal('${id}', 'set')">Set</button>
                                <button class="btn btn-red" onclick="delUser('${id}', '${u.nick}')">DEL</button>
                                <button class="btn btn-outline" onclick="resetWag('${id}')">Reset Wager</button>
                            </div>
                        </td>
                    </tr>
                `;
            });
            document.getElementById('s-u').innerText = snap.size;
            document.getElementById('s-b').innerText = tb.toLocaleString() + " $";
            document.getElementById('s-w').innerText = tw.toLocaleString() + " $";
        });

        // REAL-TIME REQUESTS
        db.collection('requests').orderBy('timestamp', 'desc').onSnapshot(snap => {
            const dReq = document.getElementById('dash-req');
            const fLog = document.getElementById('full-logs');
            let pCount = 0;
            dReq.innerHTML = '<thead><tr><th>Type</th><th>Amount</th><th>User</th><th>Action</th></tr></thead>';
            fLog.innerHTML = '<thead><tr><th>Time</th><th>User</th><th>Type</th><th>Amt</th><th>Status</th></tr></thead>';

            snap.forEach(doc => {
                const r = doc.data(); const rid = doc.id;
                const time = r.timestamp ? new Date(r.timestamp.seconds * 1000).toLocaleString() : '...';
                if(r.status === 'pending') {
                    pCount++;
                    dReq.innerHTML += `<tr><td><span class="badge ${r.type === 'deposit' ? 'badge-dep' : 'badge-wit'}">${r.type}</span></td><td>${r.amount}</td><td>${r.nick}</td><td><button class="btn btn-green" onclick="doneReq('${rid}')">Approve</button></td></tr>`;
                }
                fLog.innerHTML += `<tr><td>${time}</td><td>${r.nick}</td><td>${r.type}</td><td>${r.amount}</td><td>${r.status}</td></tr>`;
            });
            document.getElementById('s-p').innerText = pCount;
        });
    }

    // ACTIONS
    async function modBal(id, mode) {
        const val = parseInt(document.getElementById('v-'+id).value);
        if(isNaN(val)) return;
        if(mode === 'add') await db.collection('users').doc(id).update({ balance: firebase.firestore.FieldValue.increment(val) });
        else await db.collection('users').doc(id).update({ balance: val });
        document.getElementById('v-'+id).value = '';
    }

    async function delUser(id, nick) {
        if(confirm(`!!! EXTREME DANGER !!!\nAre you sure you want to PERMANENTLY DELETE user ${nick}?\nThis cannot be undone.`)) {
            await db.collection('users').doc(id).delete();
        }
    }

    async function resetWag(id) {
        if(confirm("Reset this user's wager to $0?")) {
            await db.collection('users').doc(id).update({ wagered: 0 });
        }
    }

    async function vUser(id) { await db.collection('users').doc(id).update({ verified: true }); }
    async function doneReq(id) { await db.collection('requests').doc(id).update({ status: 'done' }); }

    function filterUsers(q) {
        const val = q.toLowerCase();
        document.querySelectorAll('#user-list tr').forEach(tr => {
            tr.style.display = tr.dataset.n.includes(val) ? '' : 'none';
        });
    }

    init();
</script>
</body>
</html>
